services:
  mongo:
    image: mongo:7
    container_name: vaultledger-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - vaultledger-mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vaultledger-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      # Override MONGO_URI to point at the 'mongo' service name (Docker's internal DNS),
      # not localhost - localhost inside a container refers to the container itself, not the host.
      MONGO_URI: mongodb://mongo:27017/vaultledger
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  vaultledger-mongo-data:
